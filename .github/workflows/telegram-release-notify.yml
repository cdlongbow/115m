name: Notify Telegram on Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.draft && !github.event.release.prerelease) }}

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_NAME: ${{ github.event.release.name || 'Telegram 通知测试' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || 'manual-test' }}
          RELEASE_URL: ${{ github.event.release.html_url || github.server_url }}
          RELEASE_BODY: ${{ github.event.release.body || '这是一条 GitHub Actions 手动触发的测试通知。' }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID"
            exit 1
          fi

          python3 <<'PY' > /tmp/telegram_payload.json
          import json
          import os

          title = os.environ.get("RELEASE_NAME") or os.environ.get("RELEASE_TAG") or "New release"
          tag = os.environ.get("RELEASE_TAG") or ""
          url = os.environ.get("RELEASE_URL") or ""
          body = (os.environ.get("RELEASE_BODY") or "").strip()
          if len(body) > 2800:
              body = body[:2800].rstrip() + "\n..."

          lines = [
              "115m 新版本发布",
              f"版本：{tag}",
              f"标题：{title}",
          ]

          if body:
              lines.extend(["", body])

          if url:
              lines.extend(["", f"查看发布：{url}"])

          payload = {
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": "\n".join(lines),
              "disable_web_page_preview": False,
          }

          print(json.dumps(payload, ensure_ascii=False))
          PY

          curl --fail --show-error --silent \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data @/tmp/telegram_payload.json

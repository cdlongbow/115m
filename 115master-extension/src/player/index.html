<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>115Master Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-black text-white m-0 p-0 overflow-hidden">
  <div id="app">
    <!-- 顶部信息栏 -->
    <header id="header" class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-sm border-b border-white/10 px-6 py-3 flex items-center gap-4">
      <button id="btn-back" class="text-white/60 hover:text-white transition-colors" title="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 id="video-title" class="text-sm font-medium truncate flex-1">加载中...</h1>
      <div id="video-stats" class="text-xs text-white/40 font-mono hidden"></div>
    </header>

    <!-- 播放器容器 -->
    <div id="artplayer-app" class="w-full h-screen flex items-center justify-center"></div>

    <!-- 加载状态 -->
    <div id="loading" class="fixed inset-0 z-40 bg-black flex items-center justify-center">
      <div class="text-center">
        <div class="animate-spin w-8 h-8 border-2 border-white/20 border-t-white rounded-full mx-auto mb-4"></div>
        <p id="loading-text" class="text-white/60 text-sm">正在获取视频信息...</p>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-overlay" class="fixed inset-0 z-50 bg-black hidden">
      <div class="h-full flex items-center justify-center">
        <div class="text-center max-w-md px-4">
          <div class="text-4xl mb-4">⚠️</div>
          <p id="error-msg" class="text-white/80 mb-6">出错了</p>
          <div class="flex gap-3 justify-center">
            <button id="btn-retry" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors">重试</button>
            <button id="btn-fallback" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors hidden">降级播放</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 画质选择面板 -->
    <div id="quality-panel" class="fixed z-50 bg-zinc-900/95 backdrop-blur-sm rounded-xl border border-white/10 shadow-2xl p-2 hidden min-w-[140px]">
      <div class="text-xs text-white/40 px-3 py-1.5 uppercase tracking-wider">画质</div>
      <div id="quality-list" class="flex flex-col"></div>
    </div>

  </div>
  <script type="module" src="./player.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>115m Player</title>
  <!-- 预连接 CDN，节省 DNS+TLS 握手时间 -->
  <link rel="preconnect" href="https://dl.115cdn.net" crossorigin />
  <link rel="preconnect" href="https://cdnfhnfile.115cdn.net" crossorigin />
  <link rel="preconnect" href="https://proapi.115.com" crossorigin />
  <link rel="dns-prefetch" href="https://dl.115cdn.net" />
  <link rel="dns-prefetch" href="https://cdnfhnfile.115cdn.net" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-black text-white m-0 p-0 overflow-hidden">
  <div id="app" class="relative h-screen overflow-hidden">
    <!-- 顶部信息栏 -->
    <header id="header" class="absolute left-0 right-0 top-0 z-[200] flex items-start justify-between gap-4 bg-gradient-to-b from-black/72 via-black/28 to-transparent px-5 py-4 opacity-0 transition-opacity duration-200">
      <div class="flex min-w-0 items-start gap-3">
        <button id="btn-back" class="pointer-events-auto flex h-10 w-10 items-center justify-center rounded-full border border-white/18 bg-black/40 text-white/82 transition-colors hover:bg-black/60 hover:text-white" title="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="min-w-0 flex-1 pt-0.5">
          <div class="flex items-baseline gap-2">
            <h1 id="video-title" class="truncate text-[15px] font-semibold text-white [text-shadow:0_1px_10px_rgba(0,0,0,.55)]">加载中...</h1>
            <div id="video-stats" class="hidden shrink-0 text-xs font-medium text-white/70 [text-shadow:0_1px_10px_rgba(0,0,0,.55)]"></div>
          </div>
          <nav id="video-breadcrumbs" class="mt-1 hidden overflow-hidden text-xs text-white/78 [text-shadow:0_1px_10px_rgba(0,0,0,.55)]"></nav>
        </div>
      </div>

      <div class="pointer-events-auto flex items-center gap-2">
        <div class="flex items-center rounded-full border border-white/18 bg-black/40 px-1 py-1">
          <button id="btn-move" class="flex h-10 w-10 items-center justify-center rounded-full text-white/82 transition-colors hover:bg-white/10 hover:text-white" title="移动视频">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 9V5H5v14h14v-9"/>
              <path d="M10 14 21 3"/>
              <path d="M15 3h6v6"/>
            </svg>
          </button>
          <button id="btn-favorite" class="flex h-10 w-10 items-center justify-center rounded-full text-white/82 transition-colors hover:bg-white/10 hover:text-white" title="收藏">
            <svg id="icon-favorite-outline" width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m12 20.4-1.4-1.27C5.4 14.36 2 11.28 2 7.5 2 4.42 4.42 2 7.5 2c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 2C19.58 2 22 4.42 22 7.5c0 3.78-3.4 6.86-8.6 11.63z"/>
            </svg>
            <svg id="icon-favorite-filled" class="hidden text-pink-500" width="21" height="21" viewBox="0 0 24 24" fill="currentColor">
              <path d="m12 21.35-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/>
            </svg>
          </button>
        </div>
        <button id="btn-playlist" class="flex h-12 w-12 items-center justify-center rounded-full border border-white/18 bg-black/40 text-white/82 transition-colors hover:bg-black/60 hover:text-white" title="视频列表">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h12"/>
            <path d="M4 12h12"/>
            <path d="M4 18h8"/>
            <path d="m18 15 3 3-3 3"/>
            <path d="M21 18h-5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 播放器容器 -->
    <div id="artplayer-app" class="flex h-full w-full items-center justify-center"></div>

    <div id="playlist-mask" class="pointer-events-none absolute inset-0 z-20 bg-black/35 opacity-0 transition-opacity duration-200"></div>
    <aside id="playlist-panel" class="pointer-events-none absolute right-0 top-0 z-30 h-full w-[320px] translate-x-full border-l border-white/10 bg-black/88 px-4 py-4 text-white transition-transform duration-200">
      <div class="mb-3 flex items-center justify-between">
        <div class="text-sm font-semibold text-white/92">视频列表</div>
        <button id="btn-playlist-close" class="flex h-8 w-8 items-center justify-center rounded-full text-white/70 transition-colors hover:bg-white/10 hover:text-white" title="关闭列表">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="playlist-list" class="h-[calc(100%-44px)] overflow-y-auto"></div>
    </aside>

    <!-- 加载状态 -->
    <div id="loading" class="fixed inset-0 z-40 bg-black flex items-center justify-center">
      <div class="text-center">
        <div class="animate-spin w-8 h-8 border-2 border-white/20 border-t-white rounded-full mx-auto mb-4"></div>
        <p id="loading-text" class="text-white/60 text-sm">正在获取视频信息...</p>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-overlay" class="fixed inset-0 z-50 bg-black hidden">
      <div class="h-full flex items-center justify-center">
        <div class="text-center max-w-md px-4">
          <div class="text-4xl mb-4">⚠️</div>
          <p id="error-msg" class="text-white/80 mb-6">出错了</p>
          <div class="flex gap-3 justify-center">
            <button id="btn-retry" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors">重试</button>
            <button id="btn-fallback" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors hidden">降级播放</button>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="./player.ts"></script>
</body>
</html>
